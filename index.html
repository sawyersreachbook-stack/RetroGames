<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duda Arcade | Retro Classics</title>
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: #0f172a;
            --accent-color: #0ea5e9; /* Cyan Arcade Glow */
            --text-primary: #f8fafc;
            --text-secondary: #64748b;
            --arcade-red: #ef4444;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Courier New', Courier, monospace; /* Retro Tech Font */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 50px 20px;
            background: linear-gradient(180deg, #1e293b 0%, #020617 100%);
            text-align: center;
            border-bottom: 3px solid var(--accent-color);
            box-shadow: 0 4px 20px rgba(14, 165, 233, 0.3);
            margin-bottom: 50px;
        }

        h1 {
            margin: 0;
            font-size: 3rem;
            letter-spacing: 4px;
            color: var(--text-primary);
            text-shadow: 3px 3px 0px var(--arcade-red), -2px -2px 0px var(--accent-color);
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--accent-color);
            margin-top: 15px;
            font-size: 1.2rem;
            letter-spacing: 1px;
            font-weight: bold;
        }

        #arcade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 50px;
            width: 95%;
            max-width: 1400px;
            padding-bottom: 80px;
        }

        .game-card {
            background-color: var(--card-bg);
            border-radius: 4px; /* Sharper, more industrial corners */
            padding: 10px;
            border: 2px solid #334155;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
            position: relative;
        }

        .game-card:hover {
            border-color: var(--accent-color);
            box-shadow: 0 0 25px rgba(14, 165, 233, 0.4);
        }

        .game-header {
            background: #1e293b;
            padding: 10px;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--accent-color);
            display: flex;
            justify-content: center;
        }

        .game-title {
            font-size: 1.1rem;
            color: var(--accent-color);
            text-transform: uppercase;
            font-weight: bold;
        }

        .emulator-container {
            position: relative;
            width: 560px;
            height: 384px;
            margin: 0 auto;
            background: #000;
            overflow: hidden;
            border: 2px solid #000;
        }

        /* This hides the "Internet Archive" logo overlay that sometimes appears before load */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
        }

        .loading-state {
            padding: 100px;
            font-size: 1.5rem;
            color: var(--arcade-red);
            text-transform: uppercase;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        footer {
            margin-top: auto;
            padding: 30px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header>
        <h1>DUDA ARCADE</h1>
        <p class="subtitle">SYSTEM STATUS: ONLINE // PLAYER 1 READY</p>
    </header>

    <div id="loading" class="loading-state">Initializing System...</div>
    
    <main id="arcade-grid"></main>

    <footer>
        &copy; 2026 N. DUDA &middot; POWERED BY THE ARCHIVE ENGINE
    </footer>

    <script>
        const LIST_API_URL = "https://archive.org/services/search/v1/scrape?fields=identifier,title&q=list:pc-games AND uploader:nick_duda";

        async function fetchGames() {
            const grid = document.getElementById('arcade-grid');
            const loading = document.getElementById('loading');

            try {
                const response = await fetch(LIST_API_URL);
                const data = await response.json();
                const items = data.items || [];

                if (items.length === 0) {
                    loading.textContent = "Error: No data found in vault.";
                    return;
                }

                loading.style.display = 'none';

                items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    
                    const slug = item.identifier;
                    const title = item.title || slug.replace(/([A-Z])/g, ' $1').trim();

                    card.innerHTML = `
                        <div class="game-header">
                            <span class="game-title">${title}</span>
                        </div>
                        <div class="emulator-container">
                            <iframe 
                                src="https://archive.org/embed/${slug}" 
                                allow="fullscreen" 
                                webkitallowfullscreen="true" 
                                mozallowfullscreen="true" 
                                allowfullscreen>
                            </iframe>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                loading.textContent = "Connection Terminated. Check link status.";
            }
        }

        fetchGames();
    </script>
</body>
</html>

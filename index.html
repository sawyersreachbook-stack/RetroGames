<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duda Arcade | Retro Classics</title>
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: #0f172a;
            --accent-color: #0ea5e9;
            --text-primary: #f8fafc;
            --text-secondary: #64748b;
            --arcade-red: #ef4444;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 50px 20px;
            background: linear-gradient(180deg, #1e293b 0%, #020617 100%);
            text-align: center;
            border-bottom: 3px solid var(--accent-color);
            box-shadow: 0 4px 20px rgba(14, 165, 233, 0.3);
            margin-bottom: 50px;
        }

        h1 {
            margin: 0;
            font-size: 3rem;
            letter-spacing: 4px;
            text-shadow: 3px 3px 0px var(--arcade-red), -2px -2px 0px var(--accent-color);
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--accent-color);
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        #arcade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 50px;
            width: 95%;
            max-width: 1400px;
            padding-bottom: 80px;
        }

        .game-card {
            background-color: var(--card-bg);
            border-radius: 4px;
            padding: 10px;
            border: 2px solid #334155;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
        }

        .game-header {
            background: #1e293b;
            padding: 10px;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--accent-color);
            display: flex;
            justify-content: center;
        }

        .game-title {
            font-size: 1.1rem;
            color: var(--accent-color);
            text-transform: uppercase;
            font-weight: bold;
        }

        .emulator-container {
            width: 560px;
            height: 384px;
            margin: 0 auto;
            background: #000;
            border: 2px solid #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        footer {
            margin-top: auto;
            padding: 30px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header>
        <h1>DUDA ARCADE</h1>
        <p class="subtitle">SYSTEM STATUS: ONLINE // PLAYER 1 READY</p>
    </header>
    
    <main id="arcade-grid"></main>

    <footer>
        &copy; 2026 N. DUDA &middot; POWERED BY THE ARCHIVE ENGINE
    </footer>

    <script>
        // MANUALLY ADD YOUR GAMES HERE
        // Format: { id: 'Archive_Slug', title: 'Display Name' }
        const myGames = [
            { id: 'DukeNukemIi', title: 'Duke Nukem II' },
            { id: 'msdos_Pac-Man_1983', title: 'Pac-Man (1983)' },
            { id: 'msdos_Oregon_Trail_The_1990', title: 'The Oregon Trail' }
        ];

        const grid = document.getElementById('arcade-grid');

        myGames.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.innerHTML = `
                <div class="game-header">
                    <span class="game-title">${game.title}</span>
                </div>
                <div class="emulator-container">
                    <iframe 
                        src="https://archive.org/embed/${game.id}" 
                        allow="fullscreen" 
                        allowfullscreen>
                    </iframe>
                </div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>

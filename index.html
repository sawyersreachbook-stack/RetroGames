<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duda Arcade | Retro Classics</title>
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: #0f172a;
            --accent-color: #0ea5e9;
            --text-primary: #f8fafc;
            --text-secondary: #64748b;
            --arcade-red: #ef4444;
            --arcade-green: #22c55e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%; padding: 40px 20px;
            background: linear-gradient(180deg, #1e293b 0%, #020617 100%);
            text-align: center; border-bottom: 3px solid var(--accent-color);
            box-shadow: 0 4px 20px rgba(14, 165, 233, 0.3);
        }

        h1 { margin: 0; font-size: 3rem; letter-spacing: 4px; text-shadow: 3px 3px 0px var(--arcade-red); text-transform: uppercase; }

        .guide-panel {
            max-width: 800px; width: 90%;
            background: rgba(15, 23, 42, 0.9);
            border: 1px dashed var(--arcade-green);
            padding: 20px; margin: 30px 0;
            border-radius: 8px; font-size: 0.9rem;
        }
        .guide-title { color: var(--arcade-green); font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
        .key { background: #334155; padding: 2px 6px; border-radius: 4px; color: white; border: 1px solid #475569; }

        #arcade-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 50px; width: 95%; max-width: 1400px; padding-bottom: 80px;
        }

        .game-card { 
            background-color: var(--card-bg); 
            padding: 15px; 
            border: 2px solid #334155; 
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* Cinema Mode: Fill the screen and center the emulator */
        .game-card:fullscreen {
            background: black;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .game-header { width: 100%; background: #1e293b; padding: 10px; margin-bottom: 10px; border-bottom: 1px solid var(--accent-color); text-align: center; }
        .game-title { font-size: 1.1rem; color: var(--accent-color); text-transform: uppercase; font-weight: bold; }
        
        /* The container stays retro 4:3 */
        .emulator-container { 
            width: 640px; 
            height: 480px; 
            background: #000; 
            border: 2px solid #000; 
            position: relative;
        }

        /* Logic to scale the iframe during Cinema Mode */
        .game-card:fullscreen .emulator-container {
            border: none;
            /* We handle scaling via JavaScript to be pixel-perfect */
        }

        iframe { width: 100%; height: 100%; border: none; display: block; }

        .controls { width: 100%; display: flex; justify-content: center; padding-top: 15px; }

        .cinema-btn {
            background: var(--arcade-red);
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Hide UI elements in Cinema Mode */
        .game-card:fullscreen .game-header, 
        .game-card:fullscreen .controls {
            display: none;
        }

        footer { margin-top: auto; padding: 30px; color: var(--text-secondary); font-size: 0.8rem; text-transform: uppercase; }
    </style>
</head>
<body>

    <header>
        <h1>DUDA ARCADE</h1>
    </header>

    <div class="guide-panel">
        <div class="guide-title">🚀 SYSTEM INSTRUCTIONS</div>
        <ul style="list-style-type: none; padding: 0; line-height: 1.6;">
            <li>1. Click the <span class="key">Power Button</span> on a game to load.</li>
            <li>2. Click <span class="key">Toggle Cinema Mode</span>.</li>
            <li>3. The game will automatically scale to your screen height.</li>
            <li>4. To exit: Press <span class="key">Esc</span>.</li>
        </ul>
    </div>
    
    <main id="arcade-grid"></main>

    <footer>&copy; 2026 N. DUDA &middot; POWERED BY THE ARCHIVE ENGINE</footer>

    <script>
        const myGames = [
            { id: 'DukeNukemIi', title: 'Duke Nukem II' }
        ];

        const grid = document.getElementById('arcade-grid');

        myGames.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.id = `card-${game.id}`;
            
            card.innerHTML = `
                <div class="game-header"><span class="game-title">${game.title}</span></div>
                <div class="emulator-container" id="emu-${game.id}">
                    <iframe 
                        src="https://archive.org/embed/${game.id}" 
                        allow="fullscreen; autoplay; keyboard-trap" 
                        allowfullscreen>
                    </iframe>
                </div>
                <div class="controls">
                    <button class="cinema-btn" onclick="toggleCinema('card-${game.id}', 'emu-${game.id}')">Toggle Cinema Mode</button>
                </div>`;
            grid.appendChild(card);
        });

        function toggleCinema(cardId, emuId) {
            const card = document.getElementById(cardId);
            const emu = document.getElementById(emuId);

            if (!document.fullscreenElement) {
                card.requestFullscreen().then(() => {
                    // Calculate scale to fit screen height
                    const screenHeight = window.screen.height;
                    const scale = screenHeight / 480;
                    emu.style.transform = `scale(${scale})`;
                    emu.style.transformOrigin = 'center center';
                }).catch(err => {
                    console.log(`Error: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // Reset scale when exiting fullscreen
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                const emus = document.querySelectorAll('.emulator-container');
                emus.forEach(e => {
                    e.style.transform = 'scale(1)';
                });
            }
        });
    </script>
</body>
</html>
